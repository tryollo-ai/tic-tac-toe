name: Trigger - issue agent

# Twice a day (and on demand), pick up to 3 opt-in tickets by priority, claim
# them so a later run won't re-pull them, and run one agent per ticket. Each
# agent implements its ticket, runs no-mistakes, and opens a PR. Nothing merges
# automatically - every PR waits for the captain.
#
# Opt-in: a ticket is eligible ONLY while it carries the `agent:ready` label AND
# its card sits in the board's "Ready" column (Projects v2 Status = "Ready"), and
# is not already `claude:in-progress` / `claude:needs-captain`. The two gates are
# independent: the label marks a ticket automatable, the Ready column says "work
# it now", so an ordinary board needs no column<->label automation. Tickets
# without `agent:ready`, or parked in Backlog/any non-Ready column, are invisible.
# The Ready-column gate reads Projects v2 via PROJECTS_TOKEN and is fail-closed: a
# status that cannot be read counts as not-Ready, so nothing is wrongly picked.

on:
  schedule:
    # 00:00 and 12:00 UTC daily. GitHub cron is always UTC.
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      max:
        description: "Max tickets to pick this run"
        required: false
        default: "3"

concurrency:
  group: agent-dispatch
  cancel-in-progress: false

permissions:
  contents: read
  issues: read

jobs:
  select:
    name: Select tickets
    runs-on: ubuntu-latest
    outputs:
      numbers: ${{ steps.pick.outputs.numbers }}
    steps:
      - uses: actions/checkout@v4

      # Mint a short-lived Projects v2 token from the PROJECTS_APP GitHub App
      # (the default GITHUB_TOKEN cannot read/write user/org Projects v2). With no
      # `owner`, the action resolves the app installation from this repository, so
      # the token is repo-scoped - but it still carries the app's org-level
      # organization_projects permission, which the Ready-column gate below reads
      # through. (Do not set `owner`: that does a user/org installation lookup
      # which 404s here.) If the app secrets are absent or the app is not
      # installed on this repo the step still completes but yields an empty token,
      # so the gate simply fails closed - never blocks the job.
      - name: Mint Projects token
        id: projects_token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.PROJECTS_APP_ID }}
          private-key: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: List label-eligible issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh issue list \
            --state open \
            --label "agent:ready" \
            --json number,title,labels,createdAt,state \
            --limit 100 > issues.json
          echo "agent:ready labelled (pre column-gate):"
          node -e 'JSON.parse(require("fs").readFileSync("issues.json","utf8")).forEach(i => console.log(`  #${i.number} ${i.title}`))'

      # Annotate each labelled issue with its Projects v2 board Status so the
      # selector can keep only the ones in the "Ready" column. Fail-closed: with
      # no PROJECTS_TOKEN or an unreadable status, the issue carries no status and
      # the --require-ready-status selector below skips it. Diagnostics go to
      # stderr; stdout is the enriched JSON we feed forward.
      - name: Annotate with board status (Ready-column gate)
        env:
          PROJECTS_TOKEN: ${{ steps.projects_token.outputs.token }}
        run: |
          set -eu
          npx tsx scripts/agent-dispatch/enrichIssueStatus.cli.ts < issues.json > issues-with-status.json
          echo "Board status per labelled issue:"
          node -e 'JSON.parse(require("fs").readFileSync("issues-with-status.json","utf8")).forEach(i => console.log(`  #${i.number} ${i.title} -> ${i.status ?? "(no status)"}`))'

      - name: Pick top tickets
        id: pick
        env:
          # Pass the (possibly attacker-influenced) dispatch input through env and
          # reference the quoted variable - never interpolate event data straight
          # into a shell line. The CLI validates that it is a non-negative integer.
          MAX_INPUT: ${{ github.event.inputs.max || '3' }}
        run: |
          set -eu
          numbers="$(npx tsx scripts/agent-dispatch/selectTickets.cli.ts --max "$MAX_INPUT" --require-ready-status < issues-with-status.json)"
          echo "Selected: $numbers"
          echo "numbers=$numbers" >> "$GITHUB_OUTPUT"

  work:
    name: "Agent: issue #${{ matrix.number }}"
    needs: select
    if: needs.select.outputs.numbers != '[]'
    runs-on: ubuntu-latest
    # Bound a hung claude-code-action run so it cannot strand a ticket in
    # claude:in-progress (the if: always() park step below still runs on timeout).
    # 45 min, not 30: a full run now builds the app, captures screenshots, and
    # drives no-mistakes through review/test and its CI watch on the opened PR.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        number: ${{ fromJSON(needs.select.outputs.numbers) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
    env:
      # Derived from our own selector (validated integers), not raw event data;
      # still routed through env so no value is interpolated into a shell line.
      ISSUE_NUMBER: ${{ matrix.number }}
      BRANCH: fm/issue-${{ matrix.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Mint the Projects v2 token from the PROJECTS_APP GitHub App for this job's
      # board-sync steps (the default GITHUB_TOKEN cannot write Projects v2). With
      # no `owner`, the installation is resolved from this repository; the
      # repo-scoped token still carries the app's org-level organization_projects
      # permission. (Setting `owner` does a user/org installation lookup that 404s
      # here.) Non-fatal: absent app secrets or an uninstalled app yield an empty
      # token and the sync steps (already continue-on-error) just no-op.
      - name: Mint Projects token
        id: projects_token
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.PROJECTS_APP_ID }}
          private-key: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}

      - name: Claim ticket
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          echo "Claiming #$ISSUE_NUMBER"
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "claude:in-progress" --remove-label "agent:ready"
          gh issue comment "$ISSUE_NUMBER" \
            --body "Picked up by the agent loop. Working on it now; a PR will follow."

      - name: Load ticket
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh issue view "$ISSUE_NUMBER" --json number,title,body,url > ticket.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Best-effort board sync: move the ticket's Projects v2 card to
      # "In Progress" now that it is claimed. Guarded twice - continue-on-error
      # here and the script's own non-fatal behavior - so a missing
      # PROJECTS_TOKEN, no project, or any API error can never fail this job.
      - name: Set board status to In Progress
        continue-on-error: true
        env:
          PROJECTS_TOKEN: ${{ steps.projects_token.outputs.token }}
        run: |
          npm run --silent set-project-status -- --issue "$ISSUE_NUMBER" --status "In Progress"

      - name: Install no-mistakes CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/kunchenguid/no-mistakes/main/docs/install.sh | sh
          no-mistakes --version
          # Set up the local gate (bare repo + post-receive hook + "no-mistakes"
          # remote) for this run. Non-interactive; it needs only an "origin"
          # remote, which the checkout above provides. The gate's config lives on
          # the runner and is never committed, so every job initializes its own.
          no-mistakes init

      # Provision a headless Chrome so the agent can capture the visual evidence
      # (screenshots) the no-mistakes review uses to verify UI changes. The agent
      # drives the browser through the chrome-devtools-axi CLI; we launch a
      # long-lived Chrome with remote debugging and point the CLI at it via
      # CHROME_DEVTOOLS_AXI_BROWSER_URL rather than letting the CLI launch its own,
      # so the browser flags (headless, no-sandbox) stay under our control in CI.
      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Launch headless Chrome for visual evidence
        run: |
          set -eu
          npm i -g chrome-devtools-axi chrome-devtools-mcp
          "${{ steps.chrome.outputs.chrome-path }}" \
            --headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu \
            --remote-debugging-port=9222 --remote-debugging-address=127.0.0.1 \
            about:blank > /tmp/chrome.log 2>&1 &
          # Wait for the DevTools endpoint before the agent (and chrome-devtools-axi)
          # try to connect; fail loudly if it never comes up.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9222/json/version >/dev/null 2>&1; then
              echo "Chrome DevTools endpoint is up"; ok=1; break
            fi
            sleep 1
          done
          [ "${ok:-}" = 1 ] || { echo "Chrome never became reachable:"; cat /tmp/chrome.log; exit 1; }
          # Export connection details for the agent step and the chrome-devtools-mcp
          # bridge it spawns (the explicit MCP path skips a ~30s npx bootstrap).
          mcp_path="$(npm prefix -g)/lib/node_modules/chrome-devtools-mcp/build/src/bin/chrome-devtools-mcp.js"
          {
            echo "CHROME_DEVTOOLS_AXI_BROWSER_URL=http://127.0.0.1:9222"
            echo "CHROME_DEVTOOLS_AXI_MCP_PATH=$mcp_path"
          } >> "$GITHUB_ENV"

      - name: Run agent (implement + no-mistakes -> PR)
        id: agent
        uses: anthropics/claude-code-action@v1
        env:
          # Make the OAuth token and gh credentials available to the no-mistakes
          # pipeline the agent spawns: its review step runs its OWN claude, which
          # authenticates from CLAUDE_CODE_OAUTH_TOKEN in the environment (not from
          # claude-code-action's input), and its push/PR steps shell out to gh via
          # GH_TOKEN. The CHROME_DEVTOOLS_AXI_* vars exported above reach the agent's
          # chrome-devtools-axi calls the same way (step env + GITHUB_ENV both
          # propagate to the subprocesses the action spawns).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        with:
          # Authenticate with the Claude Code OAuth token (your Claude subscription)
          # rather than a metered ANTHROPIC_API_KEY. Set up by the Claude Code GitHub
          # installer and stored as the CLAUDE_CODE_OAUTH_TOKEN secret - the same
          # credential the installer-provided claude.yml / claude-code-review.yml use.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            You are working ticket #${{ matrix.number }} in this repository.
            The full ticket (title, body, url) is in ticket.json at the repo root - read it first.

            Do this, end to end, unattended:
            1. Create and switch to branch fm/issue-${{ matrix.number }}.
            2. Implement the change the ticket asks for. Keep it focused on the
               ticket and match the repo's existing TypeScript / ESLint / CSS
               Modules conventions. Commit your work on this branch.
            3. Capture visual evidence when the change affects the UI. Start the app
               (npm run build && npm run start, served on http://localhost:3000),
               wait until it responds, then use the `chrome-devtools-axi` CLI to
               screenshot the affected screens before and after your change into
               .no-mistakes/evidence/fm/issue-${{ matrix.number }}/. A headless
               Chrome is already running for you - chrome-devtools-axi is configured
               to connect to it, so just call it (e.g. `chrome-devtools-axi open
               http://localhost:3000`, then `chrome-devtools-axi screenshot <path>`).
               If the change has no visible UI surface (a CI, config, or build-only
               change), say so and skip the screenshots.
            4. Validate and ship with no-mistakes. Run the pipeline IN THE FOREGROUND
               and drive it to a final outcome:
                 no-mistakes axi run --yes --intent "<what the ticket asked for, plus the key decisions you made>"
               This command BLOCKS for several minutes (the review, test, and CI
               steps each take time) - that is expected and correct. Do NOT run it in
               the background, do NOT append `&`, do NOT set up a monitor or a
               status-poll loop, and do NOT end your turn while it is still running.
               Keep driving it (with `no-mistakes axi respond` if it stops at a gate)
               until it returns a final `checks-passed` or `passed` outcome. `--yes`
               auto-approves routine findings; if a finding is genuinely risky or
               irreversible, STOP without pushing and clearly explain why so the run
               can park the ticket for the captain.
            5. no-mistakes opens the PR as its final step. Make sure the PR body says
               "Closes #${{ matrix.number }}".
            Never merge anything. The captain merges.
          # Pin Opus 4.8 with the 1M-token context window ([1m] is Claude Code's
          # context-window selector). Single-quoted so the shell that splits
          # claude_args does not glob-expand the brackets.
          claude_args: "--model 'claude-opus-4-8[1m]' --allowedTools Bash,Edit,Write,Read,Glob,Grep"

      # Render the agent's run as a clean Claude <-> tools conversation on the
      # run's Summary tab (assistant text + one line per tool call, tool-result
      # metadata dropped). Cosmetic, so continue-on-error keeps a summary hiccup
      # from failing the job; runs on always() so a failed/timed-out run is still
      # summarized. The CLI treats a missing/partial execution_file as no events.
      - name: Summarize the agent run
        if: always()
        continue-on-error: true
        env:
          EXECUTION_FILE: ${{ steps.agent.outputs.execution_file }}
        run: |
          set -u
          npx tsx scripts/agent-dispatch/agentRunReport.cli.ts \
            --mode transcript \
            --execution-file "$EXECUTION_FILE" \
            --title "Agent run - issue #$ISSUE_NUMBER" >> "$GITHUB_STEP_SUMMARY"

      - name: Park ticket if no PR was opened
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          # The agent step's result and run log, routed through env (never
          # interpolated into a shell line) so the park comment can say what
          # actually happened instead of a fixed string.
          AGENT_OUTCOME: ${{ steps.agent.outcome }}
          EXECUTION_FILE: ${{ steps.agent.outputs.execution_file }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          # Resilient by design: park on ANY uncertainty. The only branch that
          # skips parking is a confirmed open PR (a numeric count greater than 0).
          pr_count="$(gh pr list --head "$BRANCH" --state open --json number --jq 'length' 2>/dev/null)" || pr_count=""
          if printf '%s' "$pr_count" | grep -qE '^[0-9]+$' && [ "$pr_count" -gt 0 ]; then
            echo "PR open for $BRANCH; leaving the claim in place for the captain to review."
            exit 0
          fi
          echo "No confirmed open PR for $BRANCH; parking #$ISSUE_NUMBER for the captain."
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "claude:in-progress" \
            --add-label "claude:needs-captain" || true
          # Build the diagnostic comment from the agent's own final message; fall
          # back to a generic body if the reporter itself ever fails, so the
          # comment is never empty.
          npx tsx scripts/agent-dispatch/agentRunReport.cli.ts \
            --mode comment \
            --execution-file "$EXECUTION_FILE" \
            --outcome "$AGENT_OUTCOME" \
            --run-url "$RUN_URL" > park-comment.md \
            || printf '%s\n' "The agent finished without opening a PR. Parked for the captain - see the run logs: $RUN_URL" > park-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file park-comment.md || true

      # Best-effort board sync mirroring the park decision: an open PR moves the
      # card to "In Review"; otherwise it moves to "Needs captain" alongside the
      # claude:needs-captain label set above. Runs on always() (so it follows a
      # failed/timed-out agent run too) and never fails the job. The merge ->
      # Done transition is left to GitHub Projects' native workflow.
      - name: Sync board status (In Review or Needs captain)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECTS_TOKEN: ${{ steps.projects_token.outputs.token }}
        run: |
          set -u
          pr_count="$(gh pr list --head "$BRANCH" --state open --json number --jq 'length' 2>/dev/null)" || pr_count=""
          if printf '%s' "$pr_count" | grep -qE '^[0-9]+$' && [ "$pr_count" -gt 0 ]; then
            status="In Review"
          else
            status="Needs captain"
          fi
          echo "Setting board status to: $status"
          npm run --silent set-project-status -- --issue "$ISSUE_NUMBER" --status "$status"
