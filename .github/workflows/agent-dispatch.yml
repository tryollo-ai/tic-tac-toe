name: Trigger - issue agent

# Twice a day (and on demand), pick up to 3 opt-in tickets, claim them so a later
# run won't re-pull them, and run one agent per ticket. Each agent implements its
# ticket, runs no-mistakes, and opens a PR. Nothing merges automatically - every
# PR waits for review.
#
# Opt-in: a ticket is eligible ONLY while it carries the `agent:ready` label AND
# its card sits in the board's "Ready" column (Projects v2 Status = "Ready"), is
# not already `agent:in-progress` / `agent:done` / `agent:needs-help`, and is not
# blocked by a still-open issue. The label marks a ticket automatable, the Ready
# column says "work it now", and the dependency gate holds back tickets whose
# prerequisites are unresolved. Tickets without `agent:ready`, parked in a
# non-Ready column, or blocked, are invisible. The Ready-column gate reads
# Projects v2 via PROJECTS_TOKEN and is fail-closed; the dependency gate reads
# GitHub's native "Blocked by" relationships (plus any "Blocked by #N" /
# "Depends on #N" written in the body) and is fail-closed too (a blocker that is
# not CLOSED, or cannot be read, still blocks), so nothing is ever wrongly picked.
#
# Which eligible tickets actually run is decided by an agent, not a fixed slice:
# the select job hands the whole eligible, dependency-annotated candidate set to
# claude and lets it choose the subset (weighing priority, how much each unblocks,
# and the per-run cap). The agent only proposes - a deterministic guardrail trims
# its answer to real eligible numbers and falls back to a priority/FIFO slice if
# the agent is unavailable, so the loop always makes safe forward progress.

on:
  schedule:
    # 00:00 and 12:00 UTC daily. GitHub cron is always UTC.
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      max:
        description: "Max tickets to pick this run"
        required: false
        default: "3"

concurrency:
  group: agent-dispatch
  cancel-in-progress: false

permissions:
  contents: read
  issues: read

jobs:
  select:
    name: Select tickets
    runs-on: ubuntu-latest
    outputs:
      numbers: ${{ steps.pick.outputs.numbers }}
    steps:
      - uses: actions/checkout@v5

      # Mint a short-lived Projects v2 token from the PROJECTS_APP GitHub App
      # (the default GITHUB_TOKEN cannot read/write user/org Projects v2). With no
      # `owner`, the action resolves the app installation from this repository, so
      # the token is repo-scoped - but it still carries the app's org-level
      # organization_projects permission, which the Ready-column gate below reads
      # through. (Do not set `owner`: that does a user/org installation lookup
      # which 404s here.) If the app secrets are absent or the app is not
      # installed on this repo the step still completes but yields an empty token,
      # so the gate simply fails closed - never blocks the job.
      - name: Mint Projects token
        id: projects_token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          client-id: ${{ secrets.PROJECTS_APP_ID }}
          private-key: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: List label-eligible issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh issue list \
            --state open \
            --label "agent:ready" \
            --json number,title,labels,createdAt,state,body \
            --limit 100 > issues.json
          echo "agent:ready labelled (pre column-gate):"
          node -e 'JSON.parse(require("fs").readFileSync("issues.json","utf8")).forEach(i => console.log(`  #${i.number} ${i.title}`))'

      # Annotate each labelled issue with its Projects v2 board Status so the
      # selector can keep only the ones in the "Ready" column. Fail-closed: with
      # no PROJECTS_TOKEN or an unreadable status, the issue carries no status and
      # the --require-ready-status selector below skips it. Diagnostics go to
      # stderr; stdout is the enriched JSON we feed forward.
      - name: Annotate with board status (Ready-column gate)
        env:
          PROJECTS_TOKEN: ${{ steps.projects_token.outputs.token }}
        run: |
          set -eu
          npx tsx scripts/agent-dispatch/enrichIssueStatus.cli.ts < issues.json > issues-with-status.json
          echo "Board status per labelled issue:"
          node -e 'JSON.parse(require("fs").readFileSync("issues-with-status.json","utf8")).forEach(i => console.log(`  #${i.number} ${i.title} -> ${i.status ?? "(no status)"}`))'

      # Resolve each labelled issue's blockers - GitHub's native "Blocked by"
      # relationships (the primary source) plus any "Blocked by #N" / "Depends on
      # #N" written in the body - to their open/closed state, so the selector can
      # hold back any ticket waiting on an unresolved prerequisite. Uses the
      # default token (issues: read covers reading issue dependencies and sibling
      # states) and is fail-closed: a blocker that is not CLOSED, or cannot be
      # read, still blocks. Issues with no blockers pass through untouched.
      # Diagnostics to stderr; stdout is the enriched JSON we feed forward.
      - name: Annotate with blocker states (dependency gate)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          npx tsx scripts/agent-dispatch/enrichDependencies.cli.ts < issues-with-status.json > issues-ready.json
          echo "Blocker states per labelled issue:"
          node -e 'JSON.parse(require("fs").readFileSync("issues-ready.json","utf8")).forEach(i => { const b=(i.blockedBy||[]).map(x=>`#${x.number}:${x.state}`).join(", "); console.log(`  #${i.number} ${i.title} -> blockedBy [${b}]`); })'

      # The agent selector needs the Claude CLI; install it just for this job.
      - name: Install Claude Code CLI
        run: |
          set -eu
          npm i -g @anthropic-ai/claude-code
          claude --version

      # Let the agent choose which eligible tickets to work this run. It reasons
      # over the enriched candidates (priority, unblocks, the cap) and returns a
      # subset; the CLI's deterministic guardrail trims that to real eligible
      # numbers and falls back to a priority/FIFO slice if the agent is
      # unavailable, so this step always emits a valid array.
      - name: Pick tickets (agent decides the subset)
        id: pick
        env:
          # Pass the (possibly attacker-influenced) dispatch input through env and
          # reference the quoted variable - never interpolate event data straight
          # into a shell line. The CLI validates that it is a non-negative integer.
          MAX_INPUT: ${{ github.event.inputs.max || '3' }}
          # The Claude subscription token that authenticates the selector agent;
          # same secret the worker agents use.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -eu
          numbers="$(npx tsx scripts/agent-dispatch/selectTicketsAgent.cli.ts --max "$MAX_INPUT" --require-ready-status < issues-ready.json)"
          echo "Selected: $numbers"
          echo "numbers=$numbers" >> "$GITHUB_OUTPUT"

  work:
    name: "Agent: issue #${{ matrix.number }}"
    needs: select
    if: needs.select.outputs.numbers != '[]'
    runs-on: ubuntu-latest
    # Bound a hung agent run so it cannot strand a ticket in agent:in-progress
    # (the if: always() park step below still runs on timeout).
    # 45 min, not 30: a full run now builds the app, captures screenshots, and
    # drives no-mistakes through review/test and its CI watch on the opened PR.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        number: ${{ fromJSON(needs.select.outputs.numbers) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
    env:
      # Derived from our own selector (validated integers), not raw event data;
      # still routed through env so no value is interpolated into a shell line.
      ISSUE_NUMBER: ${{ matrix.number }}
      # Deterministic default/fallback. The "Resolve branch name" step below
      # overrides this with a title slug appended -> agent/issue-<n>/<slug>. The
      # branch stays computed entirely from data the workflow controls (number +
      # title) so the done/park and PR-link steps can find the PR by exact head.
      BRANCH: agent/issue-${{ matrix.number }}
      # The raw stream-json events the agent step tees here as it runs. The
      # summarize and park steps below read this NDJSON for the end-of-run report.
      EXECUTION_FILE: execution.ndjson
      # The app's room store is Prisma/Postgres-backed, so the agent needs a live
      # database to start the app and capture screenshots. Point at the Postgres
      # service container declared below (mapped to localhost:5432) so the agent
      # never has to hand-roll its own Docker Postgres mid-run. The vitest suite
      # that no-mistakes' test step runs ignores this and starts its own throwaway
      # container (test/testDb.ts), so the two never collide.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    # A disposable Postgres for the agent to run the app against while it captures
    # before/after screenshots. Health-gated so steps only start once it accepts
    # connections. Schema is applied by the "Apply database migrations" step.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      # Mint a token from the GitHub App BEFORE checkout so the whole job can run
      # as the App rather than github-actions[bot]. This is what lets the agent
      # push workflow-file changes: the default GITHUB_TOKEN is categorically
      # forbidden from writing under .github/workflows/, while an App token carries
      # the App's "Workflows: write" permission - plus the Contents / Pull requests
      # / Issues permissions the push, PR, and claim steps need, and the org-level
      # Projects permission the board-sync steps need, so one token serves the
      # whole job. Minted with no `owner` so the installation resolves from this
      # repository. continue-on-error keeps the job degrading gracefully: if the
      # App secrets are absent the token output is empty and every consumer below
      # falls back to ${{ github.token }}, which still works for any ticket that
      # does not touch workflow files.
      - name: Mint app token
        id: app_token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          client-id: ${{ secrets.PROJECTS_APP_ID }}
          private-key: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}

      # Check out WITH the App token when one was minted, so its credential is the
      # one actions/checkout persists for git push - that is how no-mistakes' push
      # to origin inherits the Workflows permission. Falls back to the default
      # token when no App is configured.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token || github.token }}

      - name: Claim ticket
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          echo "Claiming #$ISSUE_NUMBER"
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "agent:in-progress" --remove-label "agent:ready"
          gh issue comment "$ISSUE_NUMBER" \
            --body "Picked up by the agent loop. Working on it now; a PR will follow."

      - name: Load ticket
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh issue view "$ISSUE_NUMBER" --json number,title,body,url > ticket.json

      # Append a slug derived from the ticket title to the branch name, so a branch
      # reads as agent/issue-42/center-the-board instead of a bare number. The slug
      # is computed here (not chosen by the agent) so the full branch stays
      # deterministic and known to the workflow: the done/park and PR-link steps
      # find the PR via `gh pr list --head "$BRANCH"`, which needs the exact name.
      # Overrides the job-level BRANCH for every later step via $GITHUB_ENV.
      - name: Resolve branch name
        run: |
          set -euo pipefail
          # lowercase -> non-alphanumerics collapse to single hyphens -> trim
          # leading/trailing hyphens -> cap at 50 chars -> re-trim a trailing hyphen
          # left by the cut. An empty/odd title falls back to the bare prefix.
          title="$(jq -r '.title // ""' ticket.json)"
          slug="$(printf '%s' "$title" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-50 | sed -E 's/-+$//')"
          # Per-run hash suffix so a re-run of the same issue never reuses a branch
          # name. The branch is otherwise deterministic (issue + title), so a re-run
          # would push to a branch a prior run already pushed - updating its stale PR
          # or hitting a non-fast-forward. Derived from run id + attempt (not random):
          # unique per dispatch and per re-run attempt, stable within one run, and
          # traceable back to the run that made it.
          hash="$(printf '%s' "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" | sha1sum | cut -c1-5)"
          if [ -n "$slug" ]; then
            branch="agent/issue-${ISSUE_NUMBER}/${slug}-${hash}"
          else
            branch="agent/issue-${ISSUE_NUMBER}/${hash}"
          fi
          echo "BRANCH=$branch" >> "$GITHUB_ENV"
          echo "Resolved branch: $branch"

      # Handoff file between the agent step and the no-mistakes step: the agent
      # writes its validation intent here and the no-mistakes step reads it as the
      # pipeline's --intent. Set via $GITHUB_ENV (one source of truth for both
      # steps) from the runner's own $RUNNER_TEMP - NOT a `${{ runner.* }}`
      # expression, which is unavailable in job-level env. Living under the runner
      # temp dir keeps it out of the repo and any PR diff.
      - name: Resolve intent-file path
        run: echo "INTENT_FILE=$RUNNER_TEMP/no-mistakes-intent.md" >> "$GITHUB_ENV"

      # Download any image attachments referenced in the ticket body so the agent
      # can actually SEE them - the Read tool renders image files to the model,
      # whereas the body only carries the attachment URL as text. GitHub stores
      # pasted images as <img src="..."> or ![](...) pointing at github.com
      # attachment URLs; on a private repo those need an authenticated fetch, so we
      # auth to github.com with GH_TOKEN and let curl drop the header on the
      # cross-host redirect to object storage (default -L behavior; the signed
      # storage URL rejects a stray Authorization header). Best-effort: this never
      # fails the job, and the agent treats .ticket-attachments/ as optional.
      - name: Download ticket attachments
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          dir=.ticket-attachments
          mkdir -p "$dir"
          # Every github.com attachment URL in the body: user-attachments/assets,
          # the older <owner>/<repo>/assets/<id> form, and user-images.* hosts.
          jq -r '.body // ""' ticket.json \
            | grep -oE 'https://(github\.com/(user-attachments/assets/[0-9a-fA-F-]+|[^/"'"'"'() ]+/[^/"'"'"'() ]+/assets/[0-9]+)|user-images\.githubusercontent\.com/[^"'"'"'() ]+)' \
            | sort -u > "$dir/urls.txt" || true
          count=0
          while IFS= read -r url; do
            [ -n "$url" ] || continue
            count=$((count + 1))
            tmp="$dir/attachment-$count"
            if curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "$url" -o "$tmp"; then
              # Name the file by its real type so Read treats it as an image.
              case "$(file --mime-type -b "$tmp")" in
                image/png)      ext=png ;;
                image/jpeg)     ext=jpg ;;
                image/gif)      ext=gif ;;
                image/webp)     ext=webp ;;
                image/svg+xml)  ext=svg ;;
                *)              ext=bin ;;
              esac
              mv "$tmp" "$dir/attachment-$count.$ext"
              echo "downloaded #$count ($ext) <- $url"
            else
              echo "WARN: failed to download $url" >&2
              rm -f "$tmp"
            fi
          done < "$dir/urls.txt"
          echo "Saved $count attachment(s) to $dir"
          ls -la "$dir" || true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Create the room-store schema on the Postgres service container before the
      # agent starts the app. `db:migrate` is `prisma migrate deploy` and reads
      # DATABASE_URL (job env) pointing at the service; the Prisma client was
      # already generated by the install step's postinstall hook.
      - name: Apply database migrations
        run: yarn db:migrate

      # Best-effort board sync: move the ticket's Projects v2 card to
      # "In Progress" now that it is claimed. Guarded twice - continue-on-error
      # here and the script's own non-fatal behavior - so a missing
      # PROJECTS_TOKEN, no project, or any API error can never fail this job.
      - name: Set board status to In Progress
        continue-on-error: true
        env:
          PROJECTS_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          yarn --silent set-project-status --issue "$ISSUE_NUMBER" --status "In Progress"

      - name: Install no-mistakes CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/kunchenguid/no-mistakes/main/docs/install.sh | sh
          no-mistakes --version
          # Set up the local gate (bare repo + post-receive hook + "no-mistakes"
          # remote) for this run. Non-interactive; it needs only an "origin"
          # remote, which the checkout above provides. The gate's config lives on
          # the runner and is never committed, so every job initializes its own.
          no-mistakes init

      # Provision a headless Chrome so the agent can capture the visual evidence
      # (screenshots) the no-mistakes review uses to verify UI changes. The agent
      # drives the browser through the chrome-devtools-axi CLI; we launch a
      # long-lived Chrome with remote debugging and point the CLI at it via
      # CHROME_DEVTOOLS_AXI_BROWSER_URL rather than letting the CLI launch its own,
      # so the browser flags (headless, no-sandbox) stay under our control in CI.
      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Launch headless Chrome for visual evidence
        run: |
          set -eu
          npm i -g chrome-devtools-axi chrome-devtools-mcp
          "${{ steps.chrome.outputs.chrome-path }}" \
            --headless=new --no-sandbox --disable-dev-shm-usage --disable-gpu \
            --remote-debugging-port=9222 --remote-debugging-address=127.0.0.1 \
            about:blank > /tmp/chrome.log 2>&1 &
          # Wait for the DevTools endpoint before the agent (and chrome-devtools-axi)
          # try to connect; fail loudly if it never comes up.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9222/json/version >/dev/null 2>&1; then
              echo "Chrome DevTools endpoint is up"; ok=1; break
            fi
            sleep 1
          done
          [ "${ok:-}" = 1 ] || { echo "Chrome never became reachable:"; cat /tmp/chrome.log; exit 1; }
          # Export connection details for the agent step and the chrome-devtools-mcp
          # bridge it spawns (the explicit MCP path skips a ~30s npx bootstrap).
          mcp_path="$(npm prefix -g)/lib/node_modules/chrome-devtools-mcp/build/src/bin/chrome-devtools-mcp.js"
          {
            echo "CHROME_DEVTOOLS_AXI_BROWSER_URL=http://127.0.0.1:9222"
            echo "CHROME_DEVTOOLS_AXI_MCP_PATH=$mcp_path"
          } >> "$GITHUB_ENV"

      # Install the Claude Code CLI so we can drive the agent directly (rather than
      # through claude-code-action). Driving it ourselves is what lets us stream a
      # clean, live turn-by-turn transcript to the job log: the action buffers all
      # events and only writes them when the run finishes, and its only live-output
      # mode is the full token/cost firehose. With the CLI we own stdout.
      - name: Install Claude Code CLI
        run: |
          set -eu
          npm i -g @anthropic-ai/claude-code
          claude --version

      # Prime the no-mistakes daemon's environment BEFORE the agent runs. The daemon
      # is a separate systemd --user service the agent only talks to over a socket,
      # so the agent step's env never reaches it - and the CLI scrubs
      # CLAUDE_CODE_OAUTH_TOKEN from its own subprocesses anyway. Without this, every
      # run burns most of its time hand-injecting auth, PATH, and git/gh credentials
      # into the daemon mid-pipeline. We inject them once, deterministically: git
      # credentials into the global config the daemon's git reads, and the auth/PATH
      # into the systemd user manager (which a regenerated unit still inherits), then
      # restart the daemon so it picks all of it up. continue-on-error so a priming
      # hiccup degrades to the agent's own fallback handling rather than failing the
      # job.
      - name: Prime no-mistakes daemon environment
        continue-on-error: true
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -eu
          export GH_TOKEN="$APP_TOKEN" GITHUB_TOKEN="$APP_TOKEN"

          # 1. Global git credentials so the daemon's git (same HOME) pushes to origin
          #    as the App - which carries the Workflows + Contents permissions the
          #    push under .github/workflows/ needs.
          git config --global \
            url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"

          # 2. Hand the daemon the auth its review-step claude and its gh need, via the
          #    systemd user manager so the values survive the unit regeneration that
          #    'daemon restart' performs. PATH is included so the daemon inherits this
          #    step's PATH (which has the global claude + no-mistakes + chrome-devtools
          #    binaries) instead of the bare systemd-manager default.
          systemctl --user import-environment CLAUDE_CODE_OAUTH_TOKEN GH_TOKEN GITHUB_TOKEN PATH

          # 3. Pin claude in the no-mistakes config by ABSOLUTE path. Importing PATH
          #    alone does not durably reach the daemon by pipeline time (the daemon's
          #    own PATH lacks the toolcache node bin where claude lives), so the robust
          #    fix is agent_path_override - the daemon then resolves claude regardless
          #    of its PATH. config.yaml is per-runner (init created it with agent: auto
          #    and the override commented out, so this is the only active override).
          CLAUDE_BIN="$(command -v claude)"
          CFG="$HOME/.no-mistakes/config.yaml"
          sed -i 's/^agent: .*/agent: claude/' "$CFG"
          printf '\nagent_path_override:\n  claude: %s\n' "$CLAUDE_BIN" >> "$CFG"

          # 4. Restart the daemon (or start it if init left it down) so it picks up the
          #    imported environment AND the pinned agent, then sanity-check it resolves
          #    claude before the agent ever calls the pipeline.
          no-mistakes daemon restart || no-mistakes daemon start || true
          no-mistakes doctor || true

      # Run the agent directly and stream its turns live. claude emits its events
      # as NDJSON on stdout (--output-format stream-json, which requires --verbose
      # in print mode); we tee the raw stream to EXECUTION_FILE for the end-of-run
      # report, then pipe it through streamTranscript.cli.ts, which prints assistant
      # text and one line per tool call - dropping the system/tool-result/usage
      # noise. Because this is our own foreground `run:` step, GitHub streams those
      # lines to the live log as each turn happens. `set -o pipefail` makes claude's
      # own exit status drive the step outcome (tee/filter normally succeed), so the
      # park step's steps.agent.outcome check still works.
      - name: Run agent (implement + screenshot + commit)
        id: agent
        env:
          # The OAuth token (your Claude subscription) authenticates the CLI. GH_TOKEN
          # backs the agent's git / gh reads; it is the App token (when minted),
          # falling back to the default token. The agent only commits locally now -
          # the no-mistakes step that follows owns the push and the PR - but the App
          # token is still handed through for any gh reads the agent does. The
          # CHROME_DEVTOOLS_AXI_* vars exported above reach chrome-devtools-axi the
          # same way. --dangerously-skip-permissions keeps the run non-interactive on
          # this ephemeral CI runner (there is no human to approve tool prompts).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
          # Built from our validated matrix integer; routed through env so no event
          # data is interpolated into the command line.
          PROMPT: |
            You are working ticket #${{ matrix.number }} in this repository.
            The full ticket (title, body, url) is in ticket.json at the repo root - read it first.
            Any images attached to the ticket have been downloaded to the
            .ticket-attachments/ directory (when it exists and is non-empty) - Read
            those image files too, so you see exactly what the reporter saw rather
            than just the attachment URL text in the body.

            Do this, end to end, unattended:
            1. Create and switch to branch %BRANCH% (use that exact name).
            2. Implement the change the ticket asks for. Keep it focused on the
               ticket and match the repo's existing TypeScript / ESLint / CSS
               Modules conventions.
            3. Capture visual evidence when the change affects the UI. A Postgres
               database is already provisioned for you and DATABASE_URL is set in
               your environment - do NOT start your own database. Start the app
               (yarn start, served on http://localhost:3000), wait until it
               responds, then use the `chrome-devtools-axi` CLI to screenshot the
               affected screens before and after your change into
               .no-mistakes/evidence/%BRANCH%/. A headless Chrome is already running
               for you - chrome-devtools-axi is configured to connect to it, so just
               call it (e.g. `chrome-devtools-axi open http://localhost:3000`, then
               `chrome-devtools-axi screenshot <path>`). If the change has no visible
               UI surface (a CI, config, or build-only change), say so and skip the
               screenshots.
            4. Commit ALL your work - the code change and any screenshot evidence -
               on branch %BRANCH%. Do NOT push and do NOT open a pull request: a
               dedicated workflow step after your turn runs the no-mistakes pipeline,
               which validates the branch, pushes it, and opens the PR. Do NOT run
               no-mistakes yourself.
            5. Write your validation intent (as Markdown) to the file whose path is
               in the INTENT_FILE environment variable. This text becomes the PR's
               "Intent" section and drives the review, so make it complete: lead with
               a one-sentence summary of the goal, then a short bulleted list of the
               key decisions and tradeoffs (one per bullet) - capture what a reviewer
               reading only the diff would not know. Write ONLY the intent itself: no
               process notes, no harness/screenshot meta, no "the PR must say...".
            Your turn is done once the work is committed on %BRANCH% and the intent
            file is written. Never push, open a PR, or merge anything.
        run: |
          set -euo pipefail
          # The PROMPT carries a %BRANCH% placeholder for the branch name, which is
          # resolved at runtime (with the title slug) and so is not known at
          # workflow-parse time; substitute the real value before invoking the agent.
          prompt="${PROMPT//%BRANCH%/$BRANCH}"
          # Pin Opus 4.8 with the 1M-token context window ([1m] is Claude Code's
          # context-window selector). Single-quoted so the shell does not glob-expand
          # the brackets.
          claude -p "$prompt" \
            --model 'claude-opus-4-8[1m]' \
            --allowedTools Bash,Edit,Write,Read,Glob,Grep \
            --output-format stream-json --verbose \
            --dangerously-skip-permissions \
            | tee "$EXECUTION_FILE" \
            | npx tsx scripts/agent-dispatch/streamTranscript.cli.ts

      # Validate and ship the agent's committed work through no-mistakes - as its
      # own plain shell step, NOT from inside the agent's turn. This is the core of
      # the split: a full no-mistakes run (review -> test -> lint -> docs -> push ->
      # PR -> CI watch) routinely exceeds 10 minutes, and the agent's Bash tool has
      # a hard 10-minute cap that auto-backgrounds any longer call - which, in
      # headless `claude -p`, silently kills the pipeline the moment the agent's
      # turn ends (the #58 / #59 parks). Run as a normal `run:` step, the only
      # bound is the job's timeout-minutes, so the pipeline blocks to completion.
      #
      # The no-mistakes daemon was primed earlier with the App token (push, incl.
      # .github/workflows/*) and the OAuth token (its review-step claude). `axi run
      # --yes` auto-resolves every gate and returns at a terminal `outcome:`; the
      # bounded respond loop is a defensive net for any intermediate decision point.
      # A `failed`/`cancelled` outcome (or no outcome at all) fails this step, and
      # the always() park step below labels the ticket agent:needs-help.
      - name: Validate and ship with no-mistakes
        id: nomistakes
        env:
          # OAuth token for no-mistakes' own review-step claude; App token (when
          # minted) so the push and opened PR go out as the App and may touch
          # workflow files, falling back to the default token.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
        run: |
          set -uo pipefail
          # Intent the agent wrote for the pipeline; fall back to a generic line so a
          # missing/empty file never aborts shipping (the review is just thinner).
          if [ -s "$INTENT_FILE" ]; then
            intent="$(cat "$INTENT_FILE")"
          else
            echo "WARN: no intent at $INTENT_FILE; using a generic fallback." >&2
            intent="Implement issue #${ISSUE_NUMBER}. See the branch's commits for details."
          fi

          # Drive the pipeline to a terminal outcome. `axi run --yes` normally
          # returns the outcome directly; the loop only fires if it stops at an
          # intermediate decision point, and is bounded so it can never spin forever.
          # Only stdout (the TOON result) is captured; the pipeline's stderr progress
          # streams straight to the job log for visibility.
          out="$(no-mistakes axi run --yes --intent "$intent")" || true
          printf '%s\n' "$out"
          i=0
          while ! printf '%s\n' "$out" | grep -qE '^outcome:'; do
            i=$((i + 1))
            if ! printf '%s\n' "$out" | grep -qE '^gate:' || [ "$i" -gt 20 ]; then
              echo "no-mistakes stopped without a terminal outcome (no gate, or loop bound hit)." >&2
              break
            fi
            out="$(no-mistakes axi respond --action approve --yes)" || true
            printf '%s\n' "$out"
          done

          outcome="$(printf '%s\n' "$out" | sed -nE 's/^outcome:[[:space:]]*([a-z-]+).*/\1/p' | head -1)"
          echo "Final no-mistakes outcome: ${outcome:-unknown}"
          echo "outcome=${outcome:-unknown}" >> "$GITHUB_OUTPUT"
          # checks-passed / passed are the only shipping outcomes; anything else
          # (failed, cancelled, or an error with no outcome) fails the step so the
          # park step takes over.
          case "$outcome" in
            checks-passed|passed) exit 0 ;;
            *) echo "no-mistakes did not reach a shipping outcome; parking." >&2; exit 1 ;;
          esac

      # Fallback PR. When no-mistakes does not reach a shipping outcome the agent's
      # committed work would otherwise park with nothing reviewable. Open a PR anyway
      # so there is always something to look at. The gate is outcome-agnostic: the
      # single source of truth is "does an open PR already exist for $BRANCH?" - the
      # same signal the Ensure-PR-closes and done/park steps below use. If no-mistakes
      # already opened a PR (shipped, or opened one then failed CI) this no-ops; only
      # when there are commits past the default branch AND no PR do we push and open
      # one with a Claude-drafted body under a deterministic [!WARNING] banner that
      # flags it skipped validation. The claude CLI + CLAUDE_CODE_OAUTH_TOKEN are
      # already provisioned earlier in the job; this is a plain run: step so the
      # agent's 10-min Bash cap is irrelevant.
      - name: Fallback - open a PR if none exists
        if: always()
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
          NM_OUTCOME: ${{ steps.nomistakes.outputs.outcome }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -uo pipefail
          # 1. Skip entirely if no-mistakes already opened a PR for this branch.
          pr="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null)" || pr=""
          if printf '%s' "$pr" | grep -qE '^[0-9]+$'; then
            echo "PR #$pr already exists for $BRANCH; no fallback needed."; exit 0
          fi
          # 2. Need committed work to PR. If the branch has no commits past the default
          #    branch, let the park step handle it.
          if [ -z "$(git log "origin/${DEFAULT_BRANCH}..HEAD" --oneline 2>/dev/null)" ]; then
            echo "No commits on $BRANCH beyond the default branch; nothing to PR."; exit 0
          fi
          # 3. Push the agent's local commits (no-mistakes never got far enough to push).
          git push -u origin "$BRANCH"
          # 4. Claude drafts the PR body from the ticket + the agent's intent + a diffstat.
          title="$(jq -r '.title // "Address issue"' ticket.json)"
          diffstat="$(git diff --stat "origin/${DEFAULT_BRANCH}...HEAD")"
          intent="$( [ -s "$INTENT_FILE" ] && cat "$INTENT_FILE" || echo '(no intent recorded)')"
          draft_prompt="Write a concise GitHub PR description in Markdown for the change below.
          Lead with a one-sentence summary, then a short bulleted list of what changed and why.
          Do NOT invent testing/validation that was not done. Output only the body.
          Ticket: ${title}
          Agent intent:
          ${intent}
          Changed files:
          ${diffstat}"
          claude -p "$draft_prompt" --model 'claude-opus-4-8[1m]' \
            --allowedTools Read,Grep,Glob --dangerously-skip-permissions > body-draft.md || true
          # 5. Deterministic banner always on top so a reviewer knows this skipped validation.
          {
            printf '> [!WARNING]\n'
            printf '> **Unvalidated fallback PR.** no-mistakes did not reach a passing outcome on this run (outcome: `%s`).\n' "${NM_OUTCOME:-unknown}"
            printf '> It was opened directly with a Claude-drafted body - review carefully before merging.\n\n'
            [ -s body-draft.md ] && cat body-draft.md || printf 'Implements #%s. See the commits for details.\n' "$ISSUE_NUMBER"
          } > fallback-pr-body.md
          gh pr create --base "${DEFAULT_BRANCH}" --head "$BRANCH" \
            --title "${title} (#${ISSUE_NUMBER})" --body-file fallback-pr-body.md

      # Render the agent's run as a clean Claude <-> tools conversation on the
      # run's Summary tab (assistant text + one line per tool call, tool-result
      # metadata dropped). Cosmetic, so continue-on-error keeps a summary hiccup
      # from failing the job; runs on always() so a failed/timed-out run is still
      # summarized. The CLI treats a missing/partial execution_file as no events.
      - name: Summarize the agent run
        if: always()
        continue-on-error: true
        run: |
          set -u
          npx tsx scripts/agent-dispatch/agentRunReport.cli.ts \
            --mode transcript \
            --format ndjson \
            --execution-file "$EXECUTION_FILE" \
            --title "Agent run - issue #$ISSUE_NUMBER" >> "$GITHUB_STEP_SUMMARY"

      # Guarantee the opened PR closes its ticket. no-mistakes builds the PR body
      # from the agent's intent text, and step 5 of the prompt asks the agent to
      # include "Closes #N" - but that is a soft instruction the model can miss
      # (it did on #45, which merged without ever linking to its issue, while #34
      # in the same batch complied). This step makes the link deterministic: if
      # GitHub does not already register #N as a closing reference of the branch's
      # open PR, prepend "Closes #N" to its body. Idempotent (an already-linked PR
      # is left untouched) and best-effort (a linking hiccup never fails the job).
      # Uses the App token when minted so the edit goes out as the same identity
      # that opened the PR, falling back to the default token.
      - name: Ensure PR closes its ticket
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || github.token }}
        run: |
          set -u
          pr_number="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null)" || pr_number=""
          if ! printf '%s' "$pr_number" | grep -qE '^[0-9]+$'; then
            echo "No open PR for $BRANCH; nothing to link."
            exit 0
          fi
          # Ask GitHub directly whether this PR already closes our ticket - the same
          # closingIssuesReferences signal the link is rendered from - so we never
          # double-prepend. index() returns the position (possibly 0) or null.
          already="$(gh pr view "$pr_number" --json closingIssuesReferences \
            --jq "[.closingIssuesReferences[].number] | index(${ISSUE_NUMBER})" 2>/dev/null)" || already="null"
          if [ "$already" != "null" ] && [ -n "$already" ]; then
            echo "PR #$pr_number already closes #$ISSUE_NUMBER; nothing to do."
            exit 0
          fi
          echo "PR #$pr_number does not close #$ISSUE_NUMBER; prepending the reference."
          body="$(gh pr view "$pr_number" --json body --jq '.body' 2>/dev/null)" || body=""
          printf 'Closes #%s\n\n%s\n' "$ISSUE_NUMBER" "$body" > pr-body.md
          gh pr edit "$pr_number" --body-file pr-body.md

      - name: Mark done if a PR was opened, else park
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          # The agent step's outcome and run log, routed through env (never
          # interpolated into a shell line) so the park comment can say what
          # actually happened instead of a fixed string. EXECUTION_FILE is the
          # job-level NDJSON path the agent step teed its stream to.
          AGENT_OUTCOME: ${{ steps.agent.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          # Resilient by design: park on ANY uncertainty. The only branch that
          # marks the ticket done is a confirmed open PR (a numeric count greater
          # than 0); everything else parks for a maintainer.
          pr_count="$(gh pr list --head "$BRANCH" --state open --json number --jq 'length' 2>/dev/null)" || pr_count=""
          if printf '%s' "$pr_count" | grep -qE '^[0-9]+$' && [ "$pr_count" -gt 0 ]; then
            echo "PR open for $BRANCH; marking #$ISSUE_NUMBER agent:done for review."
            gh issue edit "$ISSUE_NUMBER" \
              --remove-label "agent:in-progress" \
              --add-label "agent:done" || true
            exit 0
          fi
          echo "No confirmed open PR for $BRANCH; parking #$ISSUE_NUMBER for a maintainer."
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "agent:in-progress" \
            --add-label "agent:needs-help" || true
          # Build the diagnostic comment from the agent's own final message; fall
          # back to a generic body if the reporter itself ever fails, so the
          # comment is never empty.
          npx tsx scripts/agent-dispatch/agentRunReport.cli.ts \
            --mode comment \
            --format ndjson \
            --execution-file "$EXECUTION_FILE" \
            --outcome "$AGENT_OUTCOME" \
            --run-url "$RUN_URL" > park-comment.md \
            || printf '%s\n' "The agent finished without opening a PR. Parked for a maintainer - see the run logs: $RUN_URL" > park-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file park-comment.md || true

      # Best-effort board sync: an open PR moves the card to "In Review" (alongside
      # the agent:done label). A parked run sets no status - the card stays in its
      # current column and the agent:needs-help label is the only signal. Runs on
      # always() (so it follows a failed/timed-out agent run too) and never fails
      # the job. The merge -> Done transition is left to GitHub Projects' native
      # workflow.
      - name: Sync board status to In Review when a PR opened
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECTS_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -u
          pr_count="$(gh pr list --head "$BRANCH" --state open --json number --jq 'length' 2>/dev/null)" || pr_count=""
          if printf '%s' "$pr_count" | grep -qE '^[0-9]+$' && [ "$pr_count" -gt 0 ]; then
            echo "Setting board status to: In Review"
            yarn --silent set-project-status --issue "$ISSUE_NUMBER" --status "In Review"
          else
            echo "No open PR for $BRANCH; leaving the card in place (agent:needs-help flags it)."
          fi
